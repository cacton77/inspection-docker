# ============================================================
# Extension fields (YAML anchors for DRY config)
# ============================================================

x-common-env: &common-env
  DISPLAY: ${DISPLAY:-:1}
  QT_X11_NO_MITSHM: "1"
  XAUTHORITY: /tmp/.docker.xauth
  XDG_RUNTIME_DIR: /tmp/runtime-${USERNAME:-macs}
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
  CYCLONEDDS_URI: ${CYCLONEDDS_URI:-file:///config/dds/cyclonedds.xml}
  # FastDDS reads the legacy var on Humble, the new one on Jazzy. Set both.
  FASTRTPS_DEFAULT_PROFILES_FILE: ${FASTRTPS_DEFAULT_PROFILES_FILE:-/config/dds/fastdds.xml}
  FASTDDS_DEFAULT_PROFILES_FILE: ${FASTDDS_DEFAULT_PROFILES_FILE:-/config/dds/fastdds.xml}

x-nvidia-env: &nvidia-env
  <<: *common-env
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: all

x-common-build-args: &common-build-args
  ROS_DISTRO: ${ROS_DISTRO:-humble}
  USERNAME: ${USERNAME:-macs}
  UID: ${UID:-1000}
  GID: ${UID:-1000}
  VIDEO_GID: 44
  DIALOUT_GID: 20

x-common-volumes: &common-volumes
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
  - ./docker/entrypoint.sh:/entrypoint.sh:ro
  - ./src:/workspaces/shared_ws/src:rw
  - ./data:/data:rw
  - ./models:/models:rw
  - ./config:/config:rw
  - /dev:/dev
  - /tmp/runtime-${USERNAME:-macs}:/tmp/runtime-${USERNAME:-macs}:rw

x-common-service: &common-service
  container_name: ${CONTAINER_NAME:-ros2-docker-template}
  image: ${CONTAINER_NAME:-ros2-docker-template}:${ROS_DISTRO:-humble}
  stdin_open: true
  tty: true
  network_mode: host
  ipc: host
  privileged: true
  device_cgroup_rules:
    - 'c *:* rmw'
  working_dir: /workspaces/shared_ws
  user: ${UID:-1000}:${UID:-1000}
  command: ["/bin/bash"]

# ============================================================
# Services (one per platform profile)
# ============================================================

services:
  # ---- Linux x86_64, no GPU ----
  linux:
    <<: *common-service
    profiles: ["linux"]
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile.${ROS_DISTRO:-humble}
      network: host
      args:
        <<: *common-build-args
        BASE_IMAGE: osrf/ros:${ROS_DISTRO:-humble}-desktop-full
    environment:
      <<: *common-env
    volumes: *common-volumes
    group_add:
      - dialout

  # ---- Linux x86_64 with discrete NVIDIA GPU ----
  linux-gpu:
    <<: *common-service
    profiles: ["linux-gpu"]
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile.${ROS_DISTRO:-humble}
      network: host
      args:
        <<: *common-build-args
        BASE_IMAGE: osrf/ros:${ROS_DISTRO:-humble}-desktop-full
    environment:
      <<: *nvidia-env
    volumes: *common-volumes
    group_add:
      - dialout
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute, graphics]
